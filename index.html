<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProFit Tracker</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1c1c1f;
            --input-bg: #2a2a2e;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --day1: #ff7eb9; /* Pink */
            --day2: #70d6ff; /* Light Blue */
            --day3: #be95ff; /* Purple */
            --day4: #ffd460; /* Yellow */
            --day5: #63f5aa; /* Green */
            --accent: var(--day1);
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 100px; /* Space for timer */
            line-height: 1.5;
            overscroll-behavior-y: contain;
        }

        /* Header & Navigation */
        header {
            padding: 20px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .day-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .day-selector::-webkit-scrollbar { display: none; }

        .day-tab {
            padding: 10px 20px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid #333;
            color: var(--text-dim);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
        }

        .day-tab.active {
            color: #000;
            border-color: var(--accent);
            background: var(--accent);
        }

        /* Progress Bar */
        .progress-container {
            margin: 10px 16px;
            height: 8px;
            background: #2a2a2e;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Exercise Cards */
        .container {
            padding: 0 16px;
        }

        .exercise-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2e;
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .exercise-title {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
        }

        .tutorial-btn {
            background: #333;
            color: var(--text-dim);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .notes-area {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text-main);
            padding: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            resize: none;
        }

        /* Rounds Table */
        .rounds-header {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 50px;
            gap: 10px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .round-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 50px;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
            transition: opacity 0.3s ease;
        }

        .round-row.completed {
            opacity: 0.4;
        }

        .round-row.completed input {
            text-decoration: line-through;
        }

        .round-num {
            font-weight: 600;
            color: var(--text-dim);
        }

        input[type="number"] {
            background: var(--input-bg);
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            text-align: center;
        }

        input[type="checkbox"] {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Floating Timer */
        .timer-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: #1e1e22;
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .timer-display {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .timer-controls {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .timer-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #333;
            color: white;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }

        .timer-btn.start { background: var(--accent); color: #000; }
        .timer-btn.stop { background: #ff4d4d; }

        /* Hidden Utility */
        .hidden { display: none; }

        /* Custom scrollbar for desktop testing */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="day-selector" id="daySelector">
        <div class="day-tab active" onclick="switchDay(1)" data-day="1">🩷 DAY 1</div>
        <div class="day-tab" onclick="switchDay(2)" data-day="2">🩵 DAY 2</div>
        <div class="day-tab" onclick="switchDay(3)" data-day="3">💜 DAY 3</div>
        <div class="day-tab" onclick="switchDay(4)" data-day="4">💛 DAY 4</div>
        <div class="day-tab" onclick="switchDay(5)" data-day="5">💚 DAY 5</div>
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="overallProgress"></div>
    </div>
</header>

<div class="container" id="workoutContent">
    <!-- Exercises will be injected here by JavaScript -->
</div>

<div class="timer-panel" id="timerPanel">
    <div class="timer-display" id="timerDisplay">01:30</div>
    <div class="timer-controls">
        <button class="timer-btn" onclick="setTimer(60)">60s</button>
        <button class="timer-btn" onclick="setTimer(90)">90s</button>
        <button class="timer-btn" onclick="setTimer(120)">120s</button>
        <button class="timer-btn start" id="timerControl" onclick="toggleTimer()">START</button>
        <button class="timer-btn stop" onclick="resetTimer()">RESET</button>
    </div>
</div>

<script>
    // --- WORKOUT DATA ---
    const workoutData = {
        1: {
            color: '#ff7eb9',
            exercises: [
                { name: "Barbell Hip Thrusts", rounds: 3, link: "https://www.youtube.com/results?search_query=barbell+hip+thrust+form" },
                { name: "Leg Press", rounds: 3, link: "https://www.youtube.com/results?search_query=leg+press+form" },
                { name: "Leg Extensions", rounds: 3, link: "https://www.youtube.com/results?search_query=leg+extension+form" },
                { name: "Seated Leg Curl", rounds: 3, link: "https://www.youtube.com/results?search_query=seated+leg+curl+form" },
                { name: "Cable Crunch", rounds: 3, link: "https://www.youtube.com/results?search_query=cable+crunch+form" }
            ]
        },
        2: {
            color: '#70d6ff',
            exercises: [
                { name: "Seated Cable Row", rounds: 3, link: "https://www.youtube.com/results?search_query=seated+cable+row+form" },
                { name: "Lat Pulldown", rounds: 3, link: "https://www.youtube.com/results?search_query=lat+pulldown+form" },
                { name: "Dumbbell Chest Press", rounds: 3, link: "https://www.youtube.com/results?search_query=dumbbell+chest+press+form" },
                { name: "Cable Rope Upright Row", rounds: 3, link: "" },
                { name: "Standing Bicep Cable Curl", rounds: 3, link: "https://www.youtube.com/results?search_query=standing+cable+bicep+curl+form" },
                { name: "Dumbbell Skull Crushers", rounds: 3, link: "https://www.youtube.com/results?search_query=dumbbell+skull+crushers+form" }
            ]
        },
        3: {
            color: '#be95ff',
            exercises: [
                { name: "Barbell Stiff Leg Deadlift", rounds: 3, link: "https://www.youtube.com/results?search_query=stiff+leg+deadlift+form" },
                { name: "Leg Press", rounds: 3, link: "https://www.youtube.com/results?search_query=leg+press+form" },
                { name: "Dumbbell Goblet Squat", rounds: 3, link: "https://www.youtube.com/results?search_query=goblet+squat+form" },
                { name: "Seated Machine Calf Raises", rounds: 3, link: "https://www.youtube.com/results?search_query=machine+calf+raises+form" },
                { name: "Lying Leg Raises", rounds: 3, link: "https://www.youtube.com/results?search_query=lying+leg+raises+form" }
            ]
        },
        4: {
            color: '#ffd460',
            exercises: [
                { name: "Machine Chest Press", rounds: 3, link: "" },
                { name: "Single Arm Dumbbell Row", rounds: 3, link: "https://www.youtube.com/results?search_query=single+arm+dumbbell+row+form" },
                { name: "Lat Pulldown", rounds: 3, link: "https://www.youtube.com/results?search_query=lat+pulldown+form" },
                { name: "Seated Dumbbell Shoulder Press", rounds: 3, link: "https://www.youtube.com/results?search_query=dumbbell+shoulder+press+form" },
                { name: "Cable Rope Pushdown", rounds: 3, link: "https://www.youtube.com/results?search_query=cable+rope+pushdown+form" },
                { name: "Cable Rope Hammer Curls", rounds: 3, link: "https://www.youtube.com/results?search_query=cable+hammer+curls+form" }
            ]
        },
        5: {
            color: '#63f5aa',
            exercises: [
                { name: "Hip Thrust Machine", rounds: 3, link: "https://www.youtube.com/results?search_query=hip+thrust+machine+form" },
                { name: "Dumbbell Bulgarian Split Squat", rounds: 3, link: "https://www.youtube.com/results?search_query=bulgarian+split+squat+form" },
                { name: "Hack Squat", rounds: 3, link: "https://www.youtube.com/results?search_query=hack+squat+form" },
                { name: "Seated Machine Calf Raises", rounds: 3, link: "https://www.youtube.com/results?search_query=machine+calf+raises+form" },
                { name: "Decline Crunch", rounds: 3, link: "https://www.youtube.com/results?search_query=decline+crunch+form" }
            ]
        }
    };

    // --- APP STATE ---
    let currentDay = 1;
    let userSettings = JSON.parse(localStorage.getItem('profit_data')) || {};

    // --- CORE FUNCTIONS ---
    function init() {
        renderWorkout(currentDay);
        updateOverallProgress();
    }

    function switchDay(dayNum) {
        currentDay = dayNum;
        
        // Update UI Tabs
        document.querySelectorAll('.day-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.day == dayNum);
        });

        // Update Theme Color
        const color = workoutData[dayNum].color;
        document.documentElement.style.setProperty('--accent', color);

        renderWorkout(dayNum);
        updateOverallProgress();
        window.scrollTo(0,0);
    }

    function renderWorkout(day) {
        const container = document.getElementById('workoutContent');
        const dayInfo = workoutData[day];
        
        let html = '';
        dayInfo.exercises.forEach((ex, exIdx) => {
            const storageKey = `d${day}_e${exIdx}`;
            const savedData = userSettings[storageKey] || { notes: '', rounds: [] };
            
            html += `
                <div class="exercise-card">
                    <div class="exercise-header">
                        <h3 class="exercise-title">${ex.name}</h3>
                        ${ex.link ? `<a href="${ex.link}" target="_blank" class="tutorial-btn">Tutorial</a>` : `<span class="tutorial-btn" style="opacity:0.5">No Video</span>`}
                    </div>
                    
                    <textarea class="notes-area" placeholder="Exercise Notes (Seat #, feel, etc...)" 
                        oninput="saveData('${storageKey}', 'notes', this.value)">${savedData.notes || ''}</textarea>

                    <div class="rounds-header">
                        <span>SET</span>
                        <span>WEIGHT</span>
                        <span>REPS</span>
                        <span>DONE</span>
                    </div>

                    <div class="rounds-list">
                        ${Array.from({length: ex.rounds}).map((_, rIdx) => {
                            const rData = (savedData.rounds && savedData.rounds[rIdx]) ? savedData.rounds[rIdx] : { w: '', r: '', done: false };
                            const isDone = rData.done;
                            return `
                                <div class="round-row ${isDone ? 'completed' : ''}" id="row_${storageKey}_${rIdx}">
                                    <span class="round-num">${rIdx + 1}</span>
                                    <input type="number" inputmode="decimal" placeholder="-" 
                                        value="${rData.w}" oninput="saveRoundData('${storageKey}', ${rIdx}, 'w', this.value)">
                                    <input type="number" inputmode="numeric" placeholder="-" 
                                        value="${rData.r}" oninput="saveRoundData('${storageKey}', ${rIdx}, 'r', this.value)">
                                    <input type="checkbox" ${isDone ? 'checked' : ''} 
                                        onclick="toggleRound('${storageKey}', ${rIdx}, this)">
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // --- DATA PERSISTENCE ---
    function saveData(key, field, value) {
        if (!userSettings[key]) userSettings[key] = { notes: '', rounds: [] };
        userSettings[key][field] = value;
        localStorage.setItem('profit_data', JSON.stringify(userSettings));
    }

    function saveRoundData(key, rIdx, field, value) {
        if (!userSettings[key]) userSettings[key] = { notes: '', rounds: [] };
        if (!userSettings[key].rounds[rIdx]) userSettings[key].rounds[rIdx] = { w: '', r: '', done: false };
        userSettings[key].rounds[rIdx][field] = value;
        localStorage.setItem('profit_data', JSON.stringify(userSettings));
    }

    function toggleRound(key, rIdx, checkbox) {
        const row = document.getElementById(`row_${key}_${rIdx}`);
        const isChecked = checkbox.checked;
        
        if (!userSettings[key]) userSettings[key] = { notes: '', rounds: [] };
        if (!userSettings[key].rounds[rIdx]) userSettings[key].rounds[rIdx] = { w: '', r: '', done: false };
        
        userSettings[key].rounds[rIdx].done = isChecked;
        row.classList.toggle('completed', isChecked);
        
        localStorage.setItem('profit_data', JSON.stringify(userSettings));
        updateOverallProgress();

        // Trigger brief vibration on mobile if supported
        if (isChecked && window.navigator.vibrate) {
            window.navigator.vibrate(50);
        }
    }

    function updateOverallProgress() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const total = checkboxes.length;
        const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
        const percentage = total > 0 ? (checked / total) * 100 : 0;
        
        document.getElementById('overallProgress').style.width = `${percentage}%`;
    }

    // --- TIMER LOGIC ---
    let timerInterval;
    let secondsLeft = 90;
    let isRunning = false;

    function updateTimerDisplay() {
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        document.getElementById('timerDisplay').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function setTimer(secs) {
        clearInterval(timerInterval);
        isRunning = false;
        secondsLeft = secs;
        document.getElementById('timerControl').innerText = "START";
        updateTimerDisplay();
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            document.getElementById('timerControl').innerText = "RESUME";
        } else {
            document.getElementById('timerControl').innerText = "PAUSE";
            timerInterval = setInterval(() => {
                secondsLeft--;
                updateTimerDisplay();
                if (secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Rest time is over! Back to work.");
                    resetTimer();
                }
            }, 1000);
        }
        isRunning = !isRunning;
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        secondsLeft = 90;
        document.getElementById('timerControl').innerText = "START";
        updateTimerDisplay();
    }

    // Boot app
    init();

</script>
</body>
</html>
